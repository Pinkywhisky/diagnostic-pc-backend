services:
  - type: web
    name: diagnostic-pc-backend
    runtime: python
    repo: https://github.com/Pinkywhisky/diagnostic-pc-backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: API_KEY
        generateValue: true
